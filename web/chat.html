{{ block "chat" . }}

<body>
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: row;

            font-family: Arial, Helvetica, sans-serif;
        }

        #videobox,
        #chatbox {
            display: flex;
            flex-direction: column;

            height: 100%;
            width: 50dvw;
        }

        video {
            height: 50dvh;
            object-fit: cover;
        }

        #controls {
            display: flex;
            justify-content: space-between;

            padding: 0.5rem;
            background-color: grey;
            color: white;
        }

        #bubbleArea {
            flex-grow: 1;
            padding: 0.5rem;

            overflow-y: auto;
        }

        #sendArea {
            display: flex;
            flex-direction: row;

            padding: 0.5rem;
        }

        #sendArea input[type="text"] {
            width: 100%;

            padding: 0.5rem;
        }
    </style>

    <div id="videobox">
        <video id="localVideo" autoplay></video>
        <video id="remoteVideo" autoplay></video>
    </div>

    <div id="chatbox">
        <div id="controls">
            <p id="other-person"></p>
            <button hx-get="/match" hx-swap="none" onclick="rematch()">Match</button>
        </div>

        <div id="bubbleArea">
        </div>

        <form id="sendArea">
            <input type="text">
            <input type="submit" value="Send">
        </form>
    </div>

    <script>
        const socket = new WebSocket('{{ .WsAddr }}');
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const bubbleArea = document.getElementById('bubbleArea');
        let sender;
        let localStream;
        let peerConnection; 
        let remoteStream; 

        socket.addEventListener('open', async () => {
            console.log('WebSocket connection open.')
        });

        socket.addEventListener('error', (event) => {
            console.error('WebSocket error:', event);
        });

        socket.addEventListener('close', (event) => {
            console.log('WebSocket connection closed:', event);
        });

        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(function (stream) {
                localStream = stream;
                localVideo.srcObject = localStream;
            })
            .catch(function (err) {
                console.error('Error getting user media:', err);
            });

        function displayMessage(n, message) {
            let bubbleDiv = document.createElement('div');
            bubbleDiv.classList.add('bubble');
            bubbleDiv.innerHTML = "<h3>" + n + ":</h3><p>" + message + "</p>";
            bubbleArea.appendChild(bubbleDiv);
            bubbleArea.scrollTop = bubbleArea.scrollHeight;
        }

        function removeRemoteStream() {
            if (peerConnection) {
                peerConnection.close();
                remoteVideo.srcObject = null;
                document.getElementById("other-person").innerText = "";
                bubbleArea.innerHTML = '';
            }
        }

        function rematch() {
            socket.send(JSON.stringify({
                event: 'rematch',
                data: null
            }));

            removeRemoteStream();
        }

        document.getElementById('sendArea').addEventListener('submit', function (event) {
            event.preventDefault();
            const inputField = document.querySelector('#sendArea input[type="text"]');
            const message = JSON.stringify({
                event: 'message',
                data: inputField.value.trim(),
            });

            if (message !== '') {
                socket.send(message);
                displayMessage("You", message);
                inputField.value = '';
            }
        });

        socket.addEventListener('message', async function (event) {
            const msg = JSON.parse(event.data);

            switch (msg.event) {
                case 'exchange':
                    sender = msg.data.username;
                    document.getElementById("other-person").innerText = "Connected to: " + sender;

                    peerConnection = new RTCPeerConnection();

                    // handle local stream
                    localStream.getTracks().forEach(track => {
                        peerConnection.addTrack(track, localStream);
                    });

                    // Handle remote stream
                    peerConnection.ontrack = function ({ streams: [stream] }) {
                        remoteVideo.srcObject = stream;
                        remoteStream = stream;
                    };

                    if (msg.data.initiator == true) {
                        try {
                            const offer = await peerConnection.createOffer();
                            await peerConnection.setLocalDescription(offer);
                            socket.send(JSON.stringify({
                                event: 'offer',
                                data: offer,
                            }));
                            console.log('sent offer');
                        } catch (error) {
                            console.error('Error creating offer:', error);
                        }
                    }
                    break;

                case 'offer':
                    try {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(msg.data));
                        const answer = await peerConnection.createAnswer();
                        await peerConnection.setLocalDescription(answer);
                        socket.send(JSON.stringify({
                            event: 'answer',
                            data: answer,
                        }));
                        console.log('got offer, sending answer');
                    } catch (error) {
                        console.error('Error handling offer:', error);
                    }
                    break;

                case 'answer':
                    try {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(msg.data));
                        console.log('received answer');
                    } catch (error) {
                        console.error('Error handling answer:', error);
                    }
                    break;

                case 'candidate':
                    try {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(msg.data));
                        console.log('adding candidate');
                    } catch (error) {
                        console.error('Error adding ICE candidate:', error);
                    }
                    break;

                case 'rematch':
                    removeRemoteStream();
                    break;

                case 'message':
                    displayMessage(msg.data);
                    break;
            }

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.send(JSON.stringify({
                        event: 'candidate',
                        data: event.candidate
                    }));
                    console.log('sending candidate')
                }
            };

            peerConnection.oniceconnectionstatechange = (event) => {
                console.log('ICE connection state:', peerConnection.iceConnectionState);

                if (peerConnection.iceConnectionState === 'disconnected') {
                    rematch();
                }
            };
        });
    </script>
</body>
{{ end }}
